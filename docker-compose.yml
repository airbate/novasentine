version: "3.9"

services:
  novasentinel:
    build: .
    container_name: novasentinel
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./final_reports:/app/final_reports
      - ./.env:/app/.env
      - ./signals.db:/app/signals.db
